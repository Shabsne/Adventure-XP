name: Build & Publish to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest


    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout kode
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683


      - name: Opsæt Java 21
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba2847
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Kør Maven tests
        run: mvn test


      - name: Log ind på GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Udpak Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a986b14c56a98b1b8abe05a # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest


      - name: Byg og push Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b2bc # v6.15.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}