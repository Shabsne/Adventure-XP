name: CI - Compile and Test

on:
pull_request:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac

  - name: Set up JDK
    uses: actions/setup-java@99c0b8c1e2e2b6f5c3a5c4c1c7e0c6d1e2e2c9e2
    with:
      distribution: 'temurin'
      java-version: '21'
      cache: 'maven'

  - name: Cache Maven dependencies
    uses: actions/cache@13aacd865c20de90d75c6f93e70baf2a0b4c8c2c
    with:
      path: ~/.m2/repository
      key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
      restore-keys: |
        maven-${{ runner.os }}-

  - name: Compile project
    run: mvn -B compile

  - name: Run tests
    run: mvn -B test
```
