<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdventureXP | Opret bruger</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<header class="main-header">
  <div class="header-inner">
    <div class="logo">Adventure<span>XP</span></div>
    <p class="tagline">Opret en bruger</p>
  </div>
</header>

<main class="login-container">

  <form class="login-card" onsubmit="register(event)">

    <h2>Opret bruger</h2>

    <label>Navn</label>
    <input id="name" type="text" required>

    <label>Email</label>
    <input id="mail" type="email" required>

    <label>Adgangskode</label>
    <input id="password" type="password" required>

    <label>Fødselsdato</label>
    <input id="birthDate" type="date" required>

    <!-- kun synlig hvis admin -->
    <div id="role-container" style="display:none;">
      <label>Rolle</label>
      <select id="role"></select>
    </div>

    <button type="submit" class="btn-action">Opret bruger</button>

    <p id="message" class="login-error"></p>

  </form>

</main>

<script src="register.js"></script>

</body>
</html>
