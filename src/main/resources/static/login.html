<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdventureXP | Log ind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>

<div class="auth-wrapper">

    <div class="auth-card">

        <div class="auth-logo">Adventure<span>XP</span></div>

        <!-- FANER -->
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Log ind</button>
            <button class="auth-tab" id="tab-register" onclick="showTab('register')">Opret bruger</button>
        </div>

        <!-- LOG IND -->
        <div id="form-login">
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" id="mail" class="form-input" placeholder="din@mail.dk" />
            </div>
            <div class="form-group">
                <label class="form-label">Adgangskode</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••"
                       onkeydown="if(event.key==='Enter') login()" />
            </div>
            <div id="login-error" class="auth-error hidden">Forkert e-mail eller adgangskode</div>
            <button class="btn-auth" id="login-btn" onclick="login()">Log ind →</button>
        </div>

        <!-- OPRET BRUGER -->
        <div id="form-register" class="hidden">
            <div class="form-group">
                <label class="form-label">Navn</label>
                <input type="text" id="reg-name" class="form-input" placeholder="Dit fulde navn" />
            </div>
            <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" id="reg-mail" class="form-input" placeholder="din@mail.dk" />
            </div>
            <div class="form-group">
                <label class="form-label">Fødselsdato</label>
                <input type="date" id="reg-birth" class="form-input" />
            </div>
            <div class="form-group">
                <label class="form-label">Adgangskode</label>
                <input type="password" id="reg-password" class="form-input" placeholder="••••••••" />
            </div>
            <div id="register-error" class="auth-error hidden"></div>
            <button class="btn-auth" id="register-btn" onclick="register()">Opret konto →</button>
        </div>

    </div>

</div>

<script src="profile.js"></script>
</body>
</html>
