services:
  # 1. Service til din Java-app (bygget med din Dockerfile)
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/adventure_xp
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password123

  # 2. Service til din database
  db:
    image: mysql:9.1.0
    container_name: adventure-xp-db
    restart: always
    environment:
      MYSQL_DATABASE: adventure_xp
      MYSQL_ROOT_PASSWORD: password123
    # SIKKERHED: Vi mapper kun til 127.0.0.1 (localhost) på hosten
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

volumes:
  db_data: